name: Playout Engine CI

on:
  push:
    branches: [main]
    paths:
      - 'playout/**'
      - '.github/workflows/playout.yml'
  pull_request:
    branches: [main]
    paths:
      - 'playout/**'
      - '.github/workflows/playout.yml'

jobs:
  # ── Testes unitários (pure Go, sem CGO) ─────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playout
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: playout/go.mod
          cache-dependency-path: playout/go.sum

      # Testa apenas internal/ — os pacotes cmd/ dependem de CGO (systray/webview)
      # e não contêm lógica de negócio própria que precise de testes isolados.
      - name: Run tests
        run: CGO_ENABLED=0 go test ./internal/...

      - name: Vet
        run: CGO_ENABLED=0 go vet ./internal/...

  # ── Build Windows / WASAPI ──────────────────────────────────────────────────
  build-windows-wasapi:
    name: Build (Windows / WASAPI)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: playout
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: playout/go.mod
          cache-dependency-path: playout/go.sum

      # MinGW-w64 64-bit (gcc) vem pré-instalado no runner via MSYS2.
      # Adiciona ao PATH para que CGO encontre o compilador.
      - name: Add MinGW-w64 to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build playout-engine.exe (WASAPI + CLI)
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CC: gcc
          GOARCH: amd64
        # -tags "wasapi cli":
        #   wasapi -> ativa o driver WASAPI com IDs estaveis (GUIDs)
        #   cli    -> modo headless (sem systray/webview), adequado para CI
        run: |
          go build `
            -tags "wasapi cli" `
            -ldflags "-X main.Version=${{ github.sha }}" `
            -o playout-engine.exe `
            ./cmd/playout-engine

      - name: Verify binary size
        shell: pwsh
        run: |
          $item = Get-Item playout-engine.exe
          Write-Host "Binary: playout-engine.exe ($($item.Length) bytes)"
          if ($item.Length -eq 0) { exit 1 }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playout-engine-windows-wasapi-${{ github.sha }}
          path: playout/playout-engine.exe
          retention-days: 7

  # ── Build Linux ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playout
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: playout/go.mod
          cache-dependency-path: playout/go.sum

      # ── Variante 1: headless (CGO_ENABLED=0, sem driver de áudio real) ────────
      - name: Build playout-engine (headless / cli)
        env:
          CGO_ENABLED: "0"
          GOARCH: amd64
          GOOS: linux
        run: |
          go build \
            -tags "cli" \
            -ldflags "-X main.Version=${{ github.sha }}" \
            -o playout-engine-headless \
            ./cmd/playout-engine

      - name: Verify headless binary
        run: |
          size=$(stat -c%s playout-engine-headless)
          echo "playout-engine-headless: ${size} bytes"
          [ "$size" -gt 0 ]

      # ── Variante 2: portaudio (CGO_ENABLED=1, driver PortAudio real) ──────────
      - name: Install libportaudio-dev
        run: sudo apt-get install -y libportaudio2 libportaudio-dev

      - name: Build playout-engine (portaudio / cli)
        env:
          CGO_ENABLED: "1"
          GOARCH: amd64
          GOOS: linux
        run: |
          go build \
            -tags "portaudio cli" \
            -ldflags "-X main.Version=${{ github.sha }}" \
            -o playout-engine-portaudio \
            ./cmd/playout-engine

      - name: Verify portaudio binary
        run: |
          size=$(stat -c%s playout-engine-portaudio)
          echo "playout-engine-portaudio: ${size} bytes"
          [ "$size" -gt 0 ]

      # ── Upload dos artefatos ─────────────────────────────────────────────────
      - name: Upload headless artifact
        uses: actions/upload-artifact@v4
        with:
          name: playout-engine-linux-headless-${{ github.sha }}
          path: playout/playout-engine-headless
          retention-days: 7

      - name: Upload portaudio artifact
        uses: actions/upload-artifact@v4
        with:
          name: playout-engine-linux-portaudio-${{ github.sha }}
          path: playout/playout-engine-portaudio
          retention-days: 7
