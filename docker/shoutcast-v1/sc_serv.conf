; SHOUTcast v1 server configuration for local testing
; Listeners: port 8000
; Sources:   port 8001 (PortBase + 1)

; Source/streamer password
Password=radiotest

; Admin password (different from source password)
AdminPassword=admintest

; Base listener port — sources connect to PortBase+1 = 8001
PortBase=8000

; Max simultaneous listeners
MaxUser=32

; Log to stdout
LogFile=/dev/stdout

; Do not resolve hostnames (faster)
NameLookups=0

; Disable SHOUTcast.com listing
Yport=0

; Allow all IPs
AllowRelay=Yes
AllowPublicRelay=No

; Station info
StationName=RadioFlow Local Test
Genre=Test
URL=http://localhost:8000
