service:
  id: "library-01"

api:
  host: "0.0.0.0"
  port: 8081
  cors:
    allowed_origins:
      - "*"

database:
  path: "./library.db"

scanner:
  library_root: "/Users/waelson/Documents/workspace/radio-playout-engine/media"
  directories:
    musicas: "MUSIC"
    vinhetas: "VINHETA"
    jingles: "JINGLE"
    spots: "SPOT"
  extensions:
    - ".mp3"
    - ".wav"
    - ".flac"
    - ".ogg"
    - ".aac"
  ffprobe_path: "ffprobe"
  watch_enabled: true

logging:
  level: "info"
  format: "json"

auth:
  jwt_secret: "change-me-in-production"   # mínimo 32 chars em prod — use: openssl rand -hex 32
  token_ttl_minutes: 480                  # TTL do token de sessão em minutos (padrão: 480 = 8h)
