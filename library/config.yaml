service:
  id: "library-01"

api:
  host: "0.0.0.0"
  port: 8081
  cors:
    allowed_origins:
      - "*"

database:
  path: "./library.db"

scanner:
  library_root: "/Users/waelson/Documents/medias"
  metadata_source: "filename"   # "filename" | "tags"
  directories:
    musicas: "MUSIC"
    vinhetas: "VINHETA"
    jingles: "JINGLE"
    spots: "SPOT"
  extensions:
    - ".mp3"
    - ".wav"
    - ".flac"
    - ".ogg"
    - ".aac"
  ffprobe_path: "ffprobe"
  watch_enabled: true

logging:
  level: "info"
  format: "json"

auth:
  jwt_secret: "change-me-in-production"   # mínimo 32 chars em prod — use: openssl rand -hex 32
  token_ttl_minutes: 2                   # TTL do token de sessão em minutos (padrão: 480 = 8h)
  default_admin_email: "admin@radioflow.local"
  default_admin_name: "Administrador"
  default_admin_password: "Admin123"       # troque após o primeiro login
  default_reset_password: "RadioFlow@2025" # senha atribuída pelo admin ao resetar outro operador

mailer:
  enabled: false             # true = envia e-mail; false = loga o código no stderr (desenvolvimento)
  host: "smtp.gmail.com"
  port: 587
  username: ""
  password: ""
  from: "RadioFlow <noreply@radioflow.local>"
  use_tls: true              # true = STARTTLS (porta 587); false = plain (porta 25)
