<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Botoneira</title>
<style>
/* ─── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #080f16;
  --bg2:      #0d1a25;
  --bg3:      #122030;
  --border:   rgba(255,255,255,0.08);
  --cyan:     #20e6ff;
  --text:     #c8d8e0;
  --text-dim: rgba(200,216,224,0.45);
  --text-hi:  #ffffff;
  --cols:     4;
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text);
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* ─── Header ─────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  background: rgba(32,230,255,0.04);
  border-bottom: 1px solid rgba(32,230,255,0.10);
  flex-shrink: 0;
}
.hdr-badge {
  font-size: 9px; font-weight: 800; letter-spacing: 0.16em;
  color: var(--cyan); text-transform: uppercase;
  background: rgba(32,230,255,0.10); border: 1px solid rgba(32,230,255,0.22);
  border-radius: 4px; padding: 2px 8px; flex-shrink: 0;
}

/* Profile pill */
.profile-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 7px; padding: 4px 10px; cursor: pointer;
  transition: border-color .15s, background .15s; position: relative;
}
.profile-pill:hover { border-color: rgba(32,230,255,0.35); background: rgba(32,230,255,0.07); }
.pp-label { font-size: 10px; color: var(--text-dim); font-weight: 700; letter-spacing:.08em; text-transform: uppercase; }
.pp-name  { font-size: 12px; color: var(--text-hi); font-weight: 700; }
.pp-arrow { font-size: 9px; color: var(--text-dim); }

/* Dropdown */
.profile-dd {
  display: none; position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--bg2); border: 1px solid rgba(32,230,255,0.18);
  border-radius: 9px; padding: 5px; min-width: 175px;
  z-index: 300; box-shadow: 0 8px 28px rgba(0,0,0,0.65);
}
.profile-dd.open { display: block; }
.pdd-item {
  padding: 8px 11px; border-radius: 6px; cursor: pointer;
  font-size: 12px; color: var(--text);
  display: flex; align-items: center; justify-content: space-between;
  transition: background .1s;
}
.pdd-item:hover { background: rgba(32,230,255,0.08); color: var(--text-hi); }
.pdd-item.cur { color: var(--cyan); font-weight: 700; }
.pdd-del { opacity: 0; font-size: 10px; color: var(--text-dim); transition: opacity .1s; }
.pdd-item:hover .pdd-del { opacity: 1; }
.pdd-sep { height: 1px; background: var(--border); margin: 4px 0; }
.pdd-new { color: var(--cyan); font-size: 11px; }

.hdr-sep { flex: 1; }

/* Header icon buttons */
.hdr-btn {
  width: 26px; height: 26px; border-radius: 6px;
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s; flex-shrink: 0;
}
.hdr-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-hi); border-color: rgba(255,255,255,0.15); }
.hdr-btn.on { background: rgba(32,230,255,0.12); border-color: rgba(32,230,255,0.50); color: var(--cyan); }

/* Cols selector */
.cols-select {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-dim);
  font-size: 11px; font-weight: 700; font-family: inherit;
  padding: 3px 6px; cursor: pointer; outline: none; transition: all .12s;
}
.cols-select:hover { border-color: rgba(32,230,255,0.30); color: var(--text-hi); }
.cols-select option { background: var(--bg2); }

.hdr-divider { width: 1px; height: 16px; background: var(--border); }

/* ─── Edit banner ────────────────────────────────────────── */
.edit-banner {
  display: none; align-items: center; gap: 10px;
  padding: 6px 14px;
  background: rgba(167,139,250,0.07); border-bottom: 1px solid rgba(167,139,250,0.16);
  font-size: 10px; color: #a78bfa; font-weight: 700; letter-spacing:.10em; text-transform: uppercase;
  flex-shrink: 0;
}
.edit-banner.show { display: flex; }
.eb-sep { flex: 1; }
.eb-btn {
  padding: 3px 12px; border-radius: 5px; font-size: 11px; font-weight: 700;
  cursor: pointer; border: 1px solid; transition: all .12s; font-family: inherit;
}
.eb-save   { background: rgba(32,230,255,0.12); border-color: rgba(32,230,255,0.40); color: var(--cyan); }
.eb-save:hover { background: rgba(32,230,255,0.22); }
.eb-cancel { background: none; border-color: var(--border); color: var(--text-dim); }
.eb-cancel:hover { color: var(--text-hi); }

/* ─── Grid (scrollable) ──────────────────────────────────── */
.grid-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(32,230,255,0.22) transparent;
}
.grid-wrap::-webkit-scrollbar { width: 6px; }
.grid-wrap::-webkit-scrollbar-thumb { background: rgba(32,230,255,0.22); border-radius: 3px; }

.grid {
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  gap: 8px;
}

/* ─── Button card ────────────────────────────────────────── */
.hk {
  position: relative; border-radius: 10px; overflow: hidden;
  cursor: pointer; display: flex; flex-direction: column;
  min-height: 100px;
  transition: transform .10s, box-shadow .15s, filter .15s;
  border: 2px solid transparent;
}
.hk::before {
  content: ''; position: absolute; inset: 0;
  background: var(--hk-grad); z-index: 0;
}
.hk::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(155deg, rgba(255,255,255,0.13) 0%, transparent 50%, rgba(0,0,0,0.22) 100%);
  z-index: 1; pointer-events: none;
}
.hk:hover:not(.hk-add-card) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.50); filter: brightness(1.08); }
.hk:active:not(.hk-add-card) { transform: translateY(0); filter: brightness(0.95); }

/* Playing */
.hk.playing {
  border-color: rgba(255,255,255,0.55);
  animation: playGlow 1.8s ease-in-out infinite;
}
@keyframes playGlow {
  0%,100% { box-shadow: 0 0 0 3px rgba(255,255,255,0.10), 0 6px 20px rgba(0,0,0,0.45); }
  50%      { box-shadow: 0 0 0 4px rgba(255,255,255,0.26), 0 8px 28px rgba(0,0,0,0.55); }
}

/* Dark/accent state */
.hk.accent-mode { border-color: var(--hk-accent, var(--cyan)); }
.hk.accent-mode::before { background: #0b1c2a; }
.hk.accent-mode .hk-icon { color: var(--hk-accent); filter: drop-shadow(0 0 7px var(--hk-accent)); }
.hk.accent-mode .hk-name,
.hk.accent-mode .hk-time { color: var(--hk-accent); }
.hk.accent-mode .hk-sub  { color: color-mix(in srgb, var(--hk-accent) 65%, #fff); }
.hk.accent-mode .hk-fill { background: var(--hk-accent); }

/* Inner */
.hk-inner {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 7px 0; flex: 1;
}
.hk-toprow {
  display: flex; align-items: flex-start; justify-content: space-between;
  width: 100%;
}
.hk-slot {
  font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.65);
  background: rgba(0,0,0,0.28); border-radius: 3px;
  padding: 1px 5px; line-height: 1.5; letter-spacing:.04em;
}
.hk-menu {
  font-size: 12px; color: rgba(255,255,255,0.35);
  padding: 1px 3px; border-radius: 4px;
  cursor: pointer; transition: color .12s, background .12s; line-height: 1;
}
.hk-menu:hover { color: rgba(255,255,255,0.80); background: rgba(0,0,0,0.28); }

.hk-icon {
  font-size: 26px; line-height: 1; margin: 4px 0 3px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.40));
  transition: transform .15s;
}
.hk.playing .hk-icon { animation: iconBounce .55s ease-in-out infinite alternate; }
@keyframes iconBounce { to { transform: scale(1.14); } }

.hk-name {
  font-size: 11px; font-weight: 700; color: #fff;
  text-align: center; line-height: 1.25;
  text-shadow: 0 1px 3px rgba(0,0,0,0.55);
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  width: 100%;
}
.hk-sub {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.60);
  text-align: center; margin-top: 1px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.40);
}
.hk-time {
  font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.88);
  text-align: center; margin-top: 2px;
  font-family: 'Courier New', monospace; letter-spacing:.04em;
  text-shadow: 0 1px 3px rgba(0,0,0,0.45);
}
/* Progress bar */
.hk-bar { height: 4px; background: rgba(0,0,0,0.30); flex-shrink: 0; position: relative; z-index: 2; margin-top: 6px; }
.hk-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.65); border-radius: 0 2px 2px 0; transition: width .22s linear; }

/* Stop button */
.hk-stop {
  display: none; position: absolute; top: 6px; right: 6px; z-index: 10;
  width: 18px; height: 18px; border-radius: 4px;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.22);
  align-items: center; justify-content: center;
  font-size: 8px; color: rgba(255,255,255,0.65); cursor: pointer; transition: all .12s;
}
.hk.playing .hk-stop { display: flex; }
.hk-stop:hover { background: rgba(220,40,40,0.55); border-color: #ef4444; color: #fff; }

/* ─── Edit overlay ───────────────────────────────────────── */
.hk-edit-ov {
  display: none; position: absolute; inset: 0; z-index: 10;
  background: rgba(6,10,16,0.82); border-radius: 8px;
  align-items: center; justify-content: center; gap: 8px;
}
.edit-mode .hk:not(.hk-add-card) .hk-edit-ov { display: flex; }
.eo {
  width: 32px; height: 32px; border-radius: 7px; border: 1px solid;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s;
}
.eo-e { background: rgba(32,230,255,0.10); border-color: rgba(32,230,255,0.35); color: var(--cyan); }
.eo-e:hover { background: rgba(32,230,255,0.25); }
.eo-d { background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.35); color: #ef4444; }
.eo-d:hover { background: rgba(239,68,68,0.25); }

/* ─── Add card ───────────────────────────────────────────── */
.hk-add-card {
  min-height: 100px; border-radius: 10px;
  border: 2px dashed rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color .15s, background .15s;
  background: transparent;
}
.hk-add-card:hover { border-color: rgba(32,230,255,0.35); background: rgba(32,230,255,0.05); }
.hk-add-card:hover .add-icon { color: var(--cyan); border-color: rgba(32,230,255,0.35); }
.add-icon {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px dashed rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.25); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}

/* ─── Footer info ────────────────────────────────────────── */
.footer {
  padding: 5px 12px 7px;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-size: 10px; color: var(--text-dim);
  flex-shrink: 0; text-align: center;
}

/* ─── Modals ─────────────────────────────────────────────── */
.backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); z-index: 400;
  align-items: center; justify-content: center;
}
.backdrop.open { display: flex; }
.modal {
  background: var(--bg); border: 1px solid rgba(32,230,255,0.22);
  border-radius: 14px; padding: 22px 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.80);
  width: 370px;
}
.modal-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing:.14em; color: var(--cyan); margin-bottom: 18px; }
.modal-field { margin-bottom: 14px; }
.modal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing:.12em; color: var(--text-dim); display: block; margin-bottom: 6px; }
.modal-input, .modal-select {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 12px;
  color: var(--text-hi); font-size: 13px; font-family: inherit;
  outline: none; transition: border-color .15s;
}
.modal-input:focus, .modal-select:focus { border-color: rgba(32,230,255,0.45); }
.modal-select option { background: var(--bg2); }
.color-row { display: flex; gap: 7px; flex-wrap: wrap; }
.cswatch {
  width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
  border: 2px solid transparent; transition: all .12s; position: relative;
}
.cswatch.sel { border-color: #fff; transform: scale(1.18); }
.cswatch.sel::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:800; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
.modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.mbtn { padding: 8px 18px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid; transition: all .12s; font-family: inherit; }
.mbtn-ok     { background: rgba(32,230,255,0.14); border-color: rgba(32,230,255,0.45); color: var(--cyan); }
.mbtn-ok:hover { background: rgba(32,230,255,0.26); }
.mbtn-cancel { background: none; border-color: var(--border); color: var(--text-dim); }
.mbtn-cancel:hover { color: var(--text-hi); border-color: rgba(255,255,255,0.18); }

/* ─── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%) translateY(40px);
  background: var(--bg2); border: 1px solid rgba(32,230,255,0.22);
  border-radius: 8px; padding: 6px 16px;
  font-size: 11px; font-weight: 600; color: var(--text-hi);
  box-shadow: 0 4px 16px rgba(0,0,0,0.55); opacity: 0;
  transition: transform .22s, opacity .22s; z-index: 500; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<div class="header">
  <span class="hdr-badge">◉ Botoneira</span>

  <div class="profile-pill" id="profilePill" onclick="toggleDD(event)">
    <div>
      <div class="pp-label">Perfil</div>
      <div class="pp-name" id="ppName">Manhã</div>
    </div>
    <span class="pp-arrow">▾</span>
    <div class="profile-dd" id="profileDD"></div>
  </div>

  <div class="hdr-sep"></div>

  <label style="font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Colunas</label>
  <select class="cols-select" id="colsSel" onchange="setCols(this.value)">
    <option value="3">3</option>
    <option value="4" selected>4</option>
    <option value="5">5</option>
    <option value="6">6</option>
  </select>

  <div class="hdr-divider"></div>
  <button class="hdr-btn" id="btnEdit" title="Editar botoneira" onclick="toggleEdit()">✎</button>
  <button class="hdr-btn" title="Novo perfil" onclick="openProfModal()">＋</button>
</div>

<!-- ══ EDIT BANNER ═════════════════════════════════════════ -->
<div class="edit-banner" id="editBanner">
  ✎ Modo edição — clique nos botões para editar ou remover
  <span class="eb-sep"></span>
  <button class="eb-btn eb-save"   onclick="saveEdit()">Salvar</button>
  <button class="eb-btn eb-cancel" onclick="cancelEdit()">Cancelar</button>
</div>

<!-- ══ GRID ════════════════════════════════════════════════ -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- ══ FOOTER ══════════════════════════════════════════════ -->
<div class="footer" id="footer"></div>

<!-- Button modal -->
<div class="backdrop" id="btnBackdrop">
  <div class="modal">
    <div class="modal-title" id="btnModalTitle">Configurar botão</div>
    <div class="modal-field">
      <label class="modal-label">Rótulo</label>
      <input class="modal-input" id="mLabel" placeholder="Ex: Abertura Manhã">
    </div>
    <div class="modal-field">
      <label class="modal-label">Tipo</label>
      <select class="modal-select" id="mType">
        <option>MUSIC</option><option>VINHETA</option><option>JINGLE</option>
        <option>SPOT</option><option>EFEITO</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">Arquivo</label>
      <input class="modal-input" id="mPath" placeholder="/audio/arquivo.mp3">
    </div>
    <div class="modal-field">
      <label class="modal-label">Cor</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-foot">
      <button class="mbtn mbtn-cancel" onclick="closeBtnModal()">Cancelar</button>
      <button class="mbtn mbtn-ok"     onclick="saveBtnModal()">Salvar</button>
    </div>
  </div>
</div>

<!-- Profile modal -->
<div class="backdrop" id="profBackdrop">
  <div class="modal" style="width:310px">
    <div class="modal-title">Novo perfil</div>
    <div class="modal-field">
      <label class="modal-label">Nome</label>
      <input class="modal-input" id="mProfName" placeholder="Ex: Tarde, Fim de semana…">
    </div>
    <div class="modal-foot">
      <button class="mbtn mbtn-cancel" onclick="closeProfModal()">Cancelar</button>
      <button class="mbtn mbtn-ok"     onclick="saveProfModal()">Criar</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
/* ══════════ PALETTES ══════════════════════════════════════ */
const PALETTES = [
  { id:'purple', grad:'linear-gradient(145deg,#7c6dea,#4a38b5)', accent:'#a78bfa' },
  { id:'teal',   grad:'linear-gradient(145deg,#1a8ca8,#0e5970)', accent:'#20e6ff' },
  { id:'gold',   grad:'linear-gradient(145deg,#d4a030,#9a6a08)', accent:'#fcd34d' },
  { id:'red',    grad:'linear-gradient(145deg,#e05050,#a01818)', accent:'#fca5a5' },
  { id:'green',  grad:'linear-gradient(145deg,#2ab870,#12703a)', accent:'#6ee7b7' },
  { id:'blue',   grad:'linear-gradient(145deg,#3a8de0,#1850a0)', accent:'#93c5fd' },
  { id:'orange', grad:'linear-gradient(145deg,#e08030,#a04808)', accent:'#fdba74' },
  { id:'pink',   grad:'linear-gradient(145deg,#d060a0,#902070)', accent:'#f9a8d4' },
];
const pal = id => PALETTES.find(p => p.id === id) || PALETTES[0];

/* ══════════ STATE ═════════════════════════════════════════ */
let profiles = [
  { id:'manha', name:'Manhã', cols:4, btns:[
    { id:1,  label:'Vinheta InfoAudio', type:'VINHETA', path:'/a/v01.mp3', pal:'purple', dur:5700,  sub:'03' },
    { id:2,  label:'Vinheta InfoAudio', type:'VINHETA', path:'/a/v02.mp3', pal:'teal',   dur:6500,  sub:'06' },
    { id:3,  label:'Vinheta InfoAudio', type:'VINHETA', path:'/a/v03.mp3', pal:'gold',   dur:7800,  sub:'05.1' },
    { id:4,  label:'Vinheta InfoAudio', type:'VINHETA', path:'/a/v04.mp3', pal:'gold',   dur:6500,  sub:'06' },
    { id:5,  label:'Jingle Inst.',      type:'JINGLE',  path:'/a/j01.mp3', pal:'blue',   dur:8200,  sub:'J1' },
    { id:6,  label:'BG Notícia',        type:'MUSIC',   path:'/a/bg.mp3',  pal:'teal',   dur:180000,sub:'BG' },
    { id:7,  label:'Spot XPTO',         type:'SPOT',    path:'/a/s01.mp3', pal:'orange', dur:30000, sub:'SP' },
    { id:8,  label:'Efeito Aplauso',    type:'EFEITO',  path:'/a/ef.mp3',  pal:'green',  dur:3200,  sub:'EF' },
    { id:9,  label:'Abertura Tarde',    type:'VINHETA', path:'/a/at.mp3',  pal:'red',    dur:9000,  sub:'AT' },
    { id:10, label:'Encerramento',      type:'VINHETA', path:'/a/enc.mp3', pal:'purple', dur:11000, sub:'EN' },
  ]},
  { id:'tarde', name:'Tarde', cols:4, btns:[
    { id:1, label:'Abertura Tarde', type:'VINHETA', path:'/a/at.mp3', pal:'orange', dur:9000, sub:'AT' },
    { id:2, label:'Jingle Tarde',   type:'JINGLE',  path:'/a/jt.mp3', pal:'pink',   dur:7000, sub:'JT' },
  ]},
  { id:'fds', name:'Fim de Semana', cols:4, btns:[] },
];

let curId    = 'manha';
let editMode = false;
let editBtnId = null;
let selPal   = 'purple';
let nextBtnId = 100;
const playing = {}; // btnId → { progress, intervalId }

/* ══════════ BOOT ══════════════════════════════════════════ */
buildColorRow();
renderDD();
renderGrid();

/* ══════════ HELPERS ═══════════════════════════════════════ */
function activeProfile() { return profiles.find(p => p.id === curId); }

function setCols(v) {
  activeProfile().cols = parseInt(v);
  document.getElementById('grid').style.setProperty('--cols', v);
  // Also update the CSS variable on :root via body
  document.documentElement.style.setProperty('--cols', v);
}

/* ══════════ GRID ══════════════════════════════════════════ */
function renderGrid() {
  const prof = activeProfile();
  const cols = prof.cols || 4;
  document.getElementById('colsSel').value = cols;
  document.getElementById('grid').style.setProperty('--cols', cols);
  document.documentElement.style.setProperty('--cols', cols);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  prof.btns.forEach((b, idx) => grid.appendChild(makeCard(b, idx + 1)));

  // Add card (always at the end)
  const add = document.createElement('div');
  add.className = 'hk-add-card';
  if (editMode) add.style.display = 'none'; // hide in edit mode (edit adds via ✎)
  add.innerHTML = `<div class="add-icon">＋</div>`;
  add.onclick = () => openBtnModal(null);
  grid.appendChild(add);

  const total = prof.btns.length;
  document.getElementById('footer').textContent =
    `${total} botão${total !== 1 ? 'ões' : ''} · ${cols} colunas · máx 40`;
  document.getElementById('ppName').textContent = prof.name;

  // Restore playing progress visuals
  Object.keys(playing).forEach(btnId => {
    const ps = playing[parseInt(btnId)];
    if (!ps) return;
    const card = grid.querySelector(`[data-btn-id="${btnId}"]`);
    if (!card) return;
    card.classList.add('playing');
    const fill = card.querySelector('.hk-fill');
    if (fill) fill.style.width = ps.progress + '%';
  });
}

function makeCard(b, slotNum) {
  const p  = pal(b.pal);
  const ps = playing[b.id];

  const card = document.createElement('div');
  card.className = 'hk';
  card.dataset.btnId = b.id;
  card.style.setProperty('--hk-grad',   p.grad);
  card.style.setProperty('--hk-accent', p.accent);

  if (ps) card.classList.add('playing');

  const pct = ps ? ps.progress : 0;
  const remainMs = b.dur * (1 - pct / 100);

  card.innerHTML = `
    <div class="hk-inner">
      <div class="hk-toprow">
        <span class="hk-slot">${slotNum}</span>
        <span class="hk-menu" onclick="menuBtn(event,${b.id})">≡</span>
      </div>
      <div class="hk-icon">🎵</div>
      <div class="hk-name">${escH(b.label)}</div>
      <div class="hk-sub">${escH(b.sub || b.type)}</div>
      <div class="hk-time">${msToTS(ps ? remainMs : b.dur)}</div>
    </div>
    <div class="hk-bar"><div class="hk-fill" style="width:${pct}%"></div></div>
    <div class="hk-stop" onclick="stopEv(event,${b.id})">■</div>
    <div class="hk-edit-ov">
      <div class="eo eo-e" onclick="openBtnModal(${b.id})">✎</div>
      <div class="eo eo-d" onclick="delBtn(event,${b.id})">✕</div>
    </div>`;

  card.addEventListener('click', () => { if (!editMode) togglePlay(b); });
  return card;
}

/* ══════════ PLAYBACK ══════════════════════════════════════ */
function togglePlay(b) {
  if (playing[b.id]) { stopBtn(b.id); return; }
  playing[b.id] = { progress: 0 };
  const card = document.querySelector(`[data-btn-id="${b.id}"]`);
  if (card) card.classList.add('playing');
  toast(`▶  ${b.label}`);

  const steps = 200;
  const iv = b.dur / steps;
  const id = setInterval(() => {
    if (!playing[b.id]) { clearInterval(id); return; }
    playing[b.id].progress = Math.min(playing[b.id].progress + 100/steps, 100);
    const pct = playing[b.id].progress;
    const fill = card?.querySelector('.hk-fill');
    const time = card?.querySelector('.hk-time');
    if (fill) fill.style.width = pct + '%';
    if (time) time.textContent = msToTS(b.dur * (1 - pct/100));
    if (pct >= 100) stopBtn(b.id);
  }, iv);
  playing[b.id].intervalId = id;
}

function stopBtn(btnId) {
  if (!playing[btnId]) return;
  clearInterval(playing[btnId].intervalId);
  delete playing[btnId];
  const card = document.querySelector(`[data-btn-id="${btnId}"]`);
  if (card) {
    card.classList.remove('playing');
    const b = activeProfile().btns.find(x => x.id === btnId);
    const fill = card.querySelector('.hk-fill');
    const time = card.querySelector('.hk-time');
    if (fill) fill.style.width = '0%';
    if (time && b) time.textContent = msToTS(b.dur);
  }
}
function stopEv(e, id) { e.stopPropagation(); stopBtn(id); }
function menuBtn(e, id) { e.stopPropagation(); const b = activeProfile().btns.find(x=>x.id===id); if(b && !editMode) togglePlay(b); }

/* ══════════ EDIT MODE ═════════════════════════════════════ */
function toggleEdit() {
  editMode = !editMode;
  document.querySelector('.grid-wrap').classList.toggle('edit-mode', editMode);
  document.getElementById('grid').classList.toggle('edit-mode', editMode);
  document.getElementById('editBanner').classList.toggle('show', editMode);
  document.getElementById('btnEdit').classList.toggle('on', editMode);
  // Show/hide add card
  const addCard = document.querySelector('.hk-add-card');
  if (addCard) addCard.style.display = editMode ? 'none' : '';
}
function saveEdit()   { exitEdit(); toast('Botoneira salva'); }
function cancelEdit() { exitEdit(); renderGrid(); }
function exitEdit() {
  editMode = false;
  document.getElementById('grid').classList.remove('edit-mode');
  document.getElementById('editBanner').classList.remove('show');
  document.getElementById('btnEdit').classList.remove('on');
}

/* ══════════ BUTTON MODAL ══════════════════════════════════ */
function openBtnModal(btnId) {
  editBtnId = btnId;
  const b = btnId !== null ? activeProfile().btns.find(x => x.id === btnId) : null;
  document.getElementById('btnModalTitle').textContent = b ? `Editar botão — ${b.label}` : 'Novo botão';
  document.getElementById('mLabel').value = b?.label || '';
  document.getElementById('mType').value  = b?.type  || 'VINHETA';
  document.getElementById('mPath').value  = b?.path  || '';
  selPal = b?.pal || 'purple';
  refreshColorRow();
  document.getElementById('btnBackdrop').classList.add('open');
  setTimeout(() => document.getElementById('mLabel').focus(), 40);
}
function closeBtnModal() { document.getElementById('btnBackdrop').classList.remove('open'); editBtnId = null; }
function saveBtnModal() {
  const label = document.getElementById('mLabel').value.trim();
  if (!label) { document.getElementById('mLabel').focus(); return; }
  const prof = activeProfile();
  if (editBtnId !== null) {
    const b = prof.btns.find(x => x.id === editBtnId);
    if (b) { b.label = label; b.type = document.getElementById('mType').value; b.path = document.getElementById('mPath').value.trim() || b.path; b.pal = selPal; b.sub = label.substring(0,4).toUpperCase(); }
  } else {
    prof.btns.push({ id: ++nextBtnId, label, type: document.getElementById('mType').value, path: document.getElementById('mPath').value.trim() || `/audio/${label.toLowerCase().replace(/\s+/g,'-')}.mp3`, pal: selPal, dur: Math.floor(Math.random()*28000)+2000, sub: label.substring(0,4).toUpperCase() });
  }
  closeBtnModal();
  renderGrid();
  toast(`Botão "${label}" salvo`);
}
function delBtn(e, btnId) {
  e.stopPropagation();
  stopBtn(btnId);
  const prof = activeProfile();
  const b = prof.btns.find(x => x.id === btnId);
  prof.btns = prof.btns.filter(x => x.id !== btnId);
  renderGrid();
  toast(`Botão removido`);
}

/* ══════════ PROFILE DD ════════════════════════════════════ */
function renderDD() {
  const dd = document.getElementById('profileDD');
  dd.innerHTML = '';
  profiles.forEach(p => {
    const item = document.createElement('div');
    item.className = 'pdd-item' + (p.id === curId ? ' cur' : '');
    item.innerHTML = `<span>${p.name}</span><span class="pdd-del">✕</span>`;
    item.querySelector('.pdd-del').onclick = e => {
      e.stopPropagation();
      if (profiles.length === 1) { toast('Último perfil — não pode remover'); return; }
      profiles = profiles.filter(x => x.id !== p.id);
      if (curId === p.id) switchProfile(profiles[0].id); else renderDD();
    };
    item.onclick = e => { if (e.target.classList.contains('pdd-del')) return; switchProfile(p.id); };
    dd.appendChild(item);
  });
  const sep = document.createElement('div'); sep.className = 'pdd-sep'; dd.appendChild(sep);
  const add = document.createElement('div'); add.className = 'pdd-item pdd-new';
  add.textContent = '＋ Novo perfil';
  add.onclick = e => { e.stopPropagation(); closeDD(); openProfModal(); };
  dd.appendChild(add);
}
function switchProfile(id) {
  Object.keys(playing).forEach(bid => stopBtn(parseInt(bid)));
  curId = id; exitEdit(); renderGrid(); renderDD(); closeDD();
  toast(`Perfil "${activeProfile().name}" carregado`);
}
function toggleDD(e) { e.stopPropagation(); document.getElementById('profileDD').classList.toggle('open'); }
function closeDD()   { document.getElementById('profileDD').classList.remove('open'); }
document.addEventListener('click', closeDD);

/* ══════════ PROFILE MODAL ═════════════════════════════════ */
function openProfModal()  { document.getElementById('mProfName').value=''; document.getElementById('profBackdrop').classList.add('open'); setTimeout(()=>document.getElementById('mProfName').focus(),40); }
function closeProfModal() { document.getElementById('profBackdrop').classList.remove('open'); }
function saveProfModal() {
  const name = document.getElementById('mProfName').value.trim();
  if (!name) { document.getElementById('mProfName').focus(); return; }
  const id = 'p'+Date.now();
  profiles.push({ id, name, cols:4, btns:[] });
  closeProfModal(); switchProfile(id);
  toast(`Perfil "${name}" criado`);
}

/* ══════════ COLOR ROW ═════════════════════════════════════ */
function buildColorRow() {
  const row = document.getElementById('colorRow');
  PALETTES.forEach(p => {
    const s = document.createElement('div');
    s.className = 'cswatch' + (p.id === selPal ? ' sel' : '');
    s.style.background = p.grad;
    s.title = p.id;
    s.onclick = () => { selPal = p.id; refreshColorRow(); };
    row.appendChild(s);
  });
}
function refreshColorRow() {
  document.querySelectorAll('.cswatch').forEach((s,i) => s.classList.toggle('sel', PALETTES[i].id === selPal));
}

/* ══════════ TOAST ═════════════════════════════════════════ */
let _tt;
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ══════════ UTILS ═════════════════════════════════════════ */
function msToTS(ms) {
  ms = Math.max(0, Math.round(ms));
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0')+'.'+(Math.round(ms/100)%10);
}
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══════════ KEYBOARD ══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeBtnModal(); closeProfModal(); closeDD(); }
  if (e.key==='Enter' && document.getElementById('btnBackdrop').classList.contains('open'))  saveBtnModal();
  if (e.key==='Enter' && document.getElementById('profBackdrop').classList.contains('open')) saveProfModal();
});
</script>
</body>
