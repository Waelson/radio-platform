<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64"
     height="64"
     fill="none"
     aria-labelledby="title desc"
     role="img">
  <title id="title">Adicionar áudio à fila</title>
  <desc id="desc">Ícone azul em outline representando adicionar áudio à fila de reprodução</desc>

  <g stroke="#25B7F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lista / fila -->
    <circle cx="10" cy="16" r="1.8"/>
    <circle cx="10" cy="28" r="1.8"/>
    <circle cx="10" cy="40" r="1.8"/>
    <path d="M16 16h16"/>
    <path d="M16 28h14"/>
    <path d="M16 40h12"/>

    <!-- Nota musical / áudio -->
    <path d="M40 16v22.5"/>
    <path d="M40 16l12-3v18.5"/>
    <ellipse cx="35.5" cy="42.5" rx="4.5" ry="3.5"/>
    <ellipse cx="47.5" cy="39.5" rx="4.5" ry="3.5"/>

    <!-- Símbolo de adicionar -->
    <circle cx="50" cy="50" r="8"/>
    <path d="M50 46v8"/>
    <path d="M46 50h8"/>
  </g>
</svg>
