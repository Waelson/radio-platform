<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64"
     height="64"
     fill="none"
     aria-labelledby="title desc"
     role="img">
  <title id="title">Break comercial</title>
  <desc id="desc">Ícone azul em outline representando um bloco de anúncios na fila de reprodução</desc>

  <g stroke="#25B7F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bloco de spots comerciais -->
    <rect x="7" y="12" width="22" height="10" rx="3"/>
    <rect x="7" y="27" width="22" height="10" rx="3"/>
    <rect x="7" y="42" width="22" height="10" rx="3"/>

    <!-- Símbolos de reprodução nos spots -->
    <path d="M15 15.5l5 1.5-5 1.5z"/>
    <path d="M15 30.5l5 1.5-5 1.5z"/>
    <path d="M15 45.5l5 1.5-5 1.5z"/>

    <!-- Separador / agrupamento -->
    <path d="M33 20v24"/>
    <path d="M30 20h6"/>
    <path d="M30 44h6"/>

    <!-- Megafone / publicidade -->
    <path d="M40 28l10-5v18l-10-5v-8z"/>
    <path d="M40 29h-4a4 4 0 0 0-4 4 4 4 0 0 0 4 4h4"/>
    <path d="M50 27l4-3"/>
    <path d="M52 32h5"/>
    <path d="M50 37l4 3"/>

    <!-- Pequeno marcador de intervalo/bloco -->
    <path d="M45 12v8"/>
    <path d="M50 12v8"/>
  </g>
</svg>
